<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>預約表單</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e0e0e0;
      border-top-color: #06C755;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .message {
      font-size: 16px;
      color: #555;
      line-height: 1.6;
    }
    .error {
      color: #e53e3e;
      font-size: 15px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p class="message">正在驗證身份，請稍候...</p>
    <p class="error" id="errorMsg"></p>
  </div>
  <script>
    const LIFF_ID = "2009615216-EPrFd1Vu";
    const TALLY_URL = "https://tally.so/r/44Lv2X";
    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        const userId = profile.userId;
        window.location.href = `${TALLY_URL}?lineUserId=${userId}`;
      } catch (err) {
        document.querySelector('.spinner').style.display = 'none';
        document.querySelector('.message').textContent = '發生錯誤，請重新整理';
        document.getElementById('errorMsg').textContent = err.message || '未知錯誤';
      }
    }
    init();
  </script>
</body>
</html>
